<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Signals">
<title>Signal Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0C0C0E;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;min-height:100vh}
#app{max-width:430px;margin:0 auto;padding:0 0 40px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 18px 0}
.title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.source{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.rbtn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:none;border-radius:20px;padding:9px 15px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;font-family:inherit}
.rbtn:active{opacity:.7}
.tabs{display:flex;gap:5px;background:rgba(255,255,255,.06);border-radius:14px;padding:4px;margin:14px 18px 0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 0;border:none;background:transparent;cursor:pointer;border-radius:10px;transition:background .15s;font-family:inherit}
.tab.on{background:rgba(255,255,255,.1)}
.tdot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.tlbl{font-size:14px;color:rgba(255,255,255,.4);transition:all .15s;font-weight:400}
.tab.on .tlbl{font-weight:600;color:#fff}
.page{padding:12px 18px 0}
.hero{border-radius:22px;padding:22px 18px 20px;margin-bottom:10px;text-align:center}
.hprice{font-size:13px;color:rgba(255,255,255,.38);margin-bottom:16px}
.hring{width:96px;height:96px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;animation:pulse 2.5s ease-in-out infinite}
.hcirc{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000;line-height:1}
.hlbl{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.hconf{font-size:12px;margin-bottom:8px}
.sbars{display:flex;justify-content:center;gap:4px;margin-bottom:7px}
.sbar{width:28px;height:5px;border-radius:3px;background:rgba(255,255,255,.1);transition:background .4s}
.hsub{font-size:12px;color:rgba(255,255,255,.35)}
.card{background:rgba(255,255,255,.05);border-radius:22px;overflow:hidden;margin-bottom:10px}
.clbl{padding:12px 16px 5px;font-size:10px;color:rgba(255,255,255,.27);letter-spacing:.09em;font-weight:500}
.row{display:flex;align-items:center;padding:14px 16px;border-top:.5px solid rgba(255,255,255,.06)}
.lw{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-right:12px;display:flex;align-items:center;justify-content:center;border:1.5px solid}
.ld{width:10px;height:10px;border-radius:50%}
.rtext{flex:1;min-width:0}
.rname{font-size:15px;font-weight:500;color:#fff}
.rdet{font-size:11px;color:rgba(255,255,255,.32);margin-top:2px;line-height:1.4}
.rval{font-size:13px;font-family:monospace;font-weight:600;text-align:right;flex-shrink:0;margin-left:8px}
.badge{font-size:9px;background:rgba(48,209,88,.2);color:#30D158;border-radius:5px;padding:2px 6px;font-weight:700;margin-left:5px;vertical-align:middle}
.tag{font-size:9px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);border-radius:5px;padding:2px 6px;font-weight:600;margin-left:5px;vertical-align:middle}
.sk{display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:14px}
.skc{width:86px;height:86px;border-radius:50%;background:rgba(255,255,255,.07);animation:glow 1.4s ease infinite}
.skt{font-size:13px;color:rgba(255,255,255,.25)}
.errc{background:rgba(255,69,58,.1);border:.5px solid rgba(255,69,58,.3);border-radius:18px;padding:18px;margin-bottom:10px}
.errh{font-size:15px;font-weight:600;color:#FF453A;margin-bottom:6px}
.errb{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6}
.foot{text-align:center;font-size:11px;color:rgba(255,255,255,.18);padding-top:4px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{opacity:.35}50%{opacity:.65}}
.spinning{animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="title">Signals</div>
      <div class="source">Kraken · 15M entry · 1H gate · 4H bonus</div>
    </div>
    <button class="rbtn" onclick="go()">
      <span id="ric">&#8635;</span>
      <span id="rcd">&#8212;</span>
    </button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="page" id="page">
    <div class="sk"><div class="skc"></div><div class="skt">Loading&#8230;</div></div>
  </div>
</div>
<script>
const COINS=[
  {id:'BTC',pair:'XBTUSD',okxSym:'BTC-USDT-SWAP',color:'#FF9F0A',label:'Bitcoin'},
  {id:'SOL',pair:'SOLUSD',okxSym:'SOL-USDT-SWAP',color:'#BF5AF2',label:'Solana'},
  {id:'PEPE',pair:'PEPEUSD',okxSym:'PEPE-USDT-SWAP',color:'#30D158',label:'Pepe'},
];
let active='BTC',allData={},allErr={},tabSig={},busy=false,cd=60,timer=null,lastUp=null;

function ema(a,p){if(a.length<p)return[];const k=2/(p+1);let v=a.slice(0,p).reduce((x,y)=>x+y)/p,r=[v];for(let i=p;i<a.length;i++){v=a[i]*k+v*(1-k);r.push(v);}return r;}
function rsi(c,p=14){if(c.length<p+2)return[];const ch=c.slice(1).map((x,i)=>x-c[i]);let g=0,l=0;for(let i=0;i<p;i++){g+=ch[i]>0?ch[i]:0;l+=ch[i]<0?-ch[i]:0;}g/=p;l/=p;const r=[];for(let i=p;i<ch.length;i++){g=(g*(p-1)+(ch[i]>0?ch[i]:0))/p;l=(l*(p-1)+(ch[i]<0?-ch[i]:0))/p;r.push(l===0?100:100-100/(1+g/l));}return r;}
function calcATR(H,L,C,p=14){if(H.length<p+1)return null;const tr=H.map((h,i)=>i===0?h-L[i]:Math.max(h-L[i],Math.abs(h-C[i-1]),Math.abs(L[i]-C[i-1])));let a=tr.slice(1,p+1).reduce((x,y)=>x+y)/p;for(let i=p+1;i<tr.length;i++)a=(a*(p-1)+tr[i])/p;return a;}

async function krakenOHLC(pair,interval){
const r=await fetch(‘https://api.kraken.com/0/public/OHLC?pair=’+pair+’&interval=’+interval);
if(!r.ok)throw new Error(’Kraken HTTP ’+r.status);
const j=await r.json();
if(j.error&&j.error.length)throw new Error(j.error[0]);
const key=Object.keys(j.result).find(k=>k!==‘last’);
if(!key)throw new Error(’No data for ’+pair);
const c=j.result[key];
if(!Array.isArray(c)||c.length<50)throw new Error(’Too few candles for ’+pair);
return c.map(k=>({c:+k[4],h:+k[2],l:+k[3],v:+k[6]}));
}
async function fetchFunding(coin){
try{const r=await fetch(‘https://www.okx.com/api/v5/public/funding-rate?instId=’+coin.okxSym);const j=await r.json();const val=+j.data?.[0]?.fundingRate*100;if(!isNaN(val))return val;}catch{}
return null;
}

function analyze(c15,c1h,c4h,fp){
const cl=c15.map(x=>x.c),H=c15.map(x=>x.h),L=c15.map(x=>x.l),V=c15.map(x=>x.v);
const e9=ema(cl,9),e21=ema(cl,21),emaBull=e9.at(-1)>e21.at(-1);
const fresh=e9.length>1&&((e9.at(-2)<=e21.at(-2))!==(e9.at(-1)<=e21.at(-1)));
const rArr=rsi(cl),rSig=ema(rArr,9),rN=rArr.at(-1),rSN=rSig.at(-1);
const rsiBull=rN>rSN,rOB=rN>72,rOS=rN<30;
const m12=ema(cl,12),m26=ema(cl,26),d=m12.length-m26.length;
const mL=m26.map((v,i)=>m12[i+d]-v),mS=ema(mL,9),md=mL.length-mS.length;
const hist=mS.map((v,i)=>mL[i+md]-v),hN=hist.at(-1),hP=hist.at(-2);
const macdBull=hN>0&&hN>hP,macdBear=hN<0&&hN<hP;
const vS=V.slice(-22,-1),vMA=vS.slice(0,20).reduce((a,b)=>a+b)/20,vR=vS.at(-1)/vMA;
const atrV=calcATR(H,L,cl);
const cl1h=c1h.map(x=>x.c),trend1h=ema(cl1h,9).at(-1)>ema(cl1h,21).at(-1);
const cl4h=c4h.map(x=>x.c),trend4h=ema(cl4h,9).at(-1)>ema(cl4h,21).at(-1);
let fS=‘y’;if(fp!==null)fS=fp>0.01?‘r’:Math.abs(fp)<=0.005?‘g’:‘y’;
const inds=[
{name:‘EMA Crossover’,det:fresh?‘Fresh crossover!’:emaBull?‘EMA 9 above EMA 21’:‘EMA 9 below EMA 21’,s:emaBull?‘g’:‘r’,v:emaBull?‘Bullish’:‘Bearish’,fresh},
{name:‘RSI’,det:rOB?‘Overbought’:rOS?‘Oversold’:rsiBull?‘Above signal line’:‘Below signal line’,s:rOB?‘y’:rsiBull?‘g’:‘r’,v:rN!=null?rN.toFixed(1):’–’},
{name:‘MACD’,det:macdBull?‘Histogram growing’:macdBear?‘Histogram falling’:‘Flat / mixed’,s:macdBull?‘g’:macdBear?‘r’:‘y’,v:hN!=null?hN.toFixed(5):’–’},
{name:‘Volume’,det:vR>=1.5?‘Strong conviction’:vR>=1.0?‘Average volume’:‘Weak conviction’,s:vR>=1.5?‘g’:vR>=1.0?‘y’:‘r’,v:(vR*100).toFixed(0)+’%’},
{name:‘Funding Rate’,det:fp===null?‘Unavailable’:fp>0.01?‘Longs overcrowded’:fp<-0.005?‘Shorts crowded’:‘Balanced’,s:fS,v:fp!=null?fp.toFixed(5)+’%’:‘N/A’},
{name:‘1H Trend’,det:trend1h?‘Gate: aligned up’:‘Gate: aligned down’,s:trend1h?‘g’:‘r’,v:trend1h?‘Bullish’:‘Bearish’,gate:true},
{name:‘4H Trend’,det:trend4h?‘Bonus: confirmed’:‘Bonus: not aligned’,s:trend4h?‘g’:‘y’,v:trend4h?‘Bullish’:‘Neutral’,bonus:true},
];
const greens=inds.slice(0,5).filter(x=>x.s===‘g’).length;
const reds=inds.slice(0,5).filter(x=>x.s===‘r’).length;
let overall=‘AVOID’;
if(greens>=4&&trend1h){overall=trend4h?‘STRONG BUY’:‘BUY’;}
else if(reds>=4&&!trend1h){overall=!trend4h?‘STRONG SHORT’:‘SHORT’;}
else if((greens>=3&&trend1h)||(reds>=3&&!trend1h)){overall=‘CAUTION’;}
return{price:cl.at(-1),atr:atrV,inds,greens,reds,trend1h,trend4h,overall};
}

function fP(p,id){if(id===‘PEPE’)return’$’+p.toFixed(8);if(p>1000)return’$’+p.toLocaleString(‘en-US’,{minimumFractionDigits:2,maximumFractionDigits:2});return’$’+p.toFixed(4);}
function fL(p,id){if(id===‘PEPE’)return’$’+p.toFixed(9);if(p>1000)return’$’+p.toLocaleString(‘en-US’,{minimumFractionDigits:2,maximumFractionDigits:2});return’$’+p.toFixed(4);}

const OC={‘STRONG BUY’:’#30D158’,‘BUY’:’#30D158’,‘STRONG SHORT’:’#FF453A’,‘SHORT’:’#FF453A’,‘CAUTION’:’#FF9F0A’,‘AVOID’:‘rgba(255,255,255,0.4)’};
const OI={‘STRONG BUY’:’^^’,‘BUY’:’^’,‘STRONG SHORT’:‘vv’,‘SHORT’:‘v’,‘CAUTION’:‘o’,‘AVOID’:’–’};
const OLBL={‘STRONG BUY’:‘STRONG BUY’,‘BUY’:‘BUY’,‘STRONG SHORT’:‘STRONG SHORT’,‘SHORT’:‘SHORT’,‘CAUTION’:‘CAUTION’,‘AVOID’:‘AVOID’};
const SC={g:’#30D158’,r:’#FF453A’,y:’#FF9F0A’};
const SB={g:‘rgba(48,209,88,.15)’,r:‘rgba(255,69,58,.15)’,y:‘rgba(255,159,10,.15)’};
const SD={g:‘rgba(48,209,88,.55)’,r:‘rgba(255,69,58,.55)’,y:‘rgba(255,159,10,.55)’};

function renderTabs(){
document.getElementById(‘tabs’).innerHTML=COINS.map(c=>{
const ts=tabSig[c.id],tc=ts?OC[ts]:c.color,on=active===c.id;
return ‘<button class="tab'+(on?' on':'')+'" onclick="sw(\''+c.id+'\')">’
+’<div class="tdot" style="background:'+(ts?tc:'rgba(255,255,255,.15)')+(ts&&on?';box-shadow:0 0 9px '+tc+'99':'')+';"></div>’
+’<span class="tlbl">’+c.id+’</span></button>’;
}).join(’’);
}

function renderPage(){
const el=document.getElementById(‘page’);
const d=allData[active],e=allErr[active],coin=COINS.find(c=>c.id===active);
if(!d&&!e){el.innerHTML=’<div class="sk"><div class="skc"></div><div class="skt">Loading ‘+active+’…</div></div>’;return;}
if(e&&!d){el.innerHTML=’<div class="errc"><div class="errh">’+active+’ failed</div><div class="errb">’+e+’</div></div>’;return;}
const oc=OC[d.overall];
const isShort=d.overall===‘SHORT’||d.overall===‘STRONG SHORT’;
const isBuy=d.overall===‘BUY’||d.overall===‘STRONG BUY’;
const isStrong=d.overall===‘STRONG BUY’||d.overall===‘STRONG SHORT’;
const barColor=isShort?’#FF453A’:’#30D158’;
const barCount=isShort?d.reds:d.greens;
const bars=Array.from({length:5}).map((_,i)=>’<div class="sbar'+(i<barCount?' on':'')+'" style="'+(i<barCount?'background:'+barColor:'')+';"></div>’).join(’’);
const subLabel=isShort?(d.reds+’ of 5 signals red’):isBuy?(d.greens+’ of 5 signals green’):(d.greens+’ green / ‘+d.reds+’ red’);
const confText=isStrong?‘High confidence - 1H + 4H aligned’:(isBuy||isShort)?‘Normal confidence - 4H not aligned’:’’;
const rows=d.inds.map(ind=>{
const extra=ind.fresh?’<span class="badge">NEW</span>’:’’;
const tag=ind.gate?’<span class="tag">REQUIRED</span>’:ind.bonus?’<span class="tag">BONUS</span>’:’’;
return ‘<div class="row">’
+’<div class="lw" style="background:'+SB[ind.s]+';border-color:'+SD[ind.s]+';"><div class="ld" style="background:'+SC[ind.s]+';box-shadow:0 0 7px '+SC[ind.s]+';"></div></div>’
+’<div class="rtext"><div class="rname">’+ind.name+extra+tag+’</div><div class="rdet">’+ind.det+’</div></div>’
+’<div class="rval" style="color:'+SC[ind.s]+';">’+ind.v+’</div></div>’;
}).join(’’);
const atrHtml=d.atr&&(isBuy||isShort)?’<div class="card"><div class="clbl">ATR LEVELS - ‘+(isShort?‘SHORT’:‘LONG’)+’</div>’
+’<div class="row"><div class="rtext"><div class="rname" style="font-weight:400;color:rgba(255,255,255,.45);">Stop loss</div></div><div class="rval" style="color:#FF453A;">’+fL(d.price+(isShort?1.5:-1.5)*d.atr,active)+’</div></div>’
+’<div class="row"><div class="rtext"><div class="rname" style="font-weight:400;color:rgba(255,255,255,.45);">’+(isShort?‘Target’:‘Take profit’)+’ 1 - 2x</div></div><div class="rval" style="color:#30D158;">’+fL(d.price+(isShort?-2:2)*d.atr,active)+’</div></div>’
+’<div class="row"><div class="rtext"><div class="rname" style="font-weight:400;color:rgba(255,255,255,.45);">’+(isShort?‘Target’:‘Take profit’)+’ 2 - 3x</div></div><div class="rval" style="color:#64D2FF;">’+fL(d.price+(isShort?-3:3)*d.atr,active)+’</div></div></div>’:’’;
el.innerHTML=’<div class="hero" style="background:rgba(255,255,255,.05);border:.5px solid '+oc+'35;">’
+’<div class="hprice">’+coin.label+’ - ‘+fP(d.price,active)+’</div>’
+’<div class="hring" style="background:radial-gradient(circle,'+oc+'28 0%,'+oc+'10 65%,transparent 100%);border:1.5px solid '+oc+'55;">’
+’<div class="hcirc" style="background:'+oc+';box-shadow:0 0 28px '+oc+'70;">’+OI[d.overall]+’</div></div>’
+’<div class="hlbl" style="color:'+oc+';">’+OLBL[d.overall]+’</div>’
+(confText?’<div class="hconf" style="color:'+(isStrong?oc:'rgba(255,255,255,.35)')+';">’+confText+’</div>’:’’)
+’<div class="sbars">’+bars+’</div>’
+’<div class="hsub">’+subLabel+’</div></div>’
+’<div class="card"><div class="clbl">INDICATORS - 15M ENTRY</div>’+rows+’</div>’
+atrHtml
+’<div class="foot" id="foot">’+(lastUp?‘Updated ‘+lastUp.toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’})+’ - refreshes in ‘+cd+‘s’:’’)+’</div>’;
}

function setBtn(){document.getElementById(‘ric’).className=busy?‘spinning’:’’;document.getElementById(‘rcd’).textContent=busy?’…’:cd+‘s’;}

async function loadAll(){
if(busy)return;busy=true;setBtn();
await Promise.all(COINS.map(async coin=>{
try{
const[c15,c1h,c4h,fp]=await Promise.all([krakenOHLC(coin.pair,15),krakenOHLC(coin.pair,60),krakenOHLC(coin.pair,240),fetchFunding(coin)]);
allData[coin.id]=analyze(c15,c1h,c4h,fp);tabSig[coin.id]=allData[coin.id].overall;delete allErr[coin.id];
}catch(e){allErr[coin.id]=e.message;tabSig[coin.id]=null;}
}));
lastUp=new Date();cd=60;busy=false;renderTabs();renderPage();setBtn();
}

function sw(id){active=id;renderTabs();renderPage();}

function go(){
clearInterval(timer);loadAll();
timer=setInterval(()=>{if(!busy){cd–;setBtn();const f=document.getElementById(‘foot’);if(f&&lastUp)f.textContent=’Updated ‘+lastUp.toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’})+’ - refreshes in ’+cd+‘s’;if(cd<=0)loadAll();}},1000);
}

renderTabs();go();
</script>

</body>
</html>
